services:
  postgres:
    image: postgres:16-alpine
    container_name: 19ergmbh-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: 19er
      POSTGRES_PASSWORD: 19er_dev_password
      POSTGRES_DB: 19ergmbh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 19er -d 19ergmbh"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
